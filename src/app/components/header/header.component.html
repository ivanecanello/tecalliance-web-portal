<header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">My Task List</h1>

    <nav class="hidden md:flex gap-8">
      <a routerLink="/home"
        routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="text-gray-700 hover:text-blue-600 pb-2 font-medium">
        Home
      </a>
      <a routerLink="/about"
        routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="text-gray-700 hover:text-blue-600 pb-2 font-medium">
        About
      </a>
    </nav>

    <div class="flex items-center gap-4">
      @if (currentUser()) {
        <span class="text-gray-600 text-sm hidden sm:inline">
          {{ currentUser()?.email }}
        </span>
      }
      <button class="flex" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span class="span-padding">Logout</span>
      </button>
    </div>
  </div>
</header>
