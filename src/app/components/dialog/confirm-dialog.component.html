<div class="p-6">
  <h2 mat-dialog-title class="text-lg font-semibold text-gray-800 mb-4">
    Delete this task?
  </h2>
  <mat-dialog-content class="mb-6">
    <p class="text-gray-600">
      Are you sure you want to delete the following task?
    </p>
    <p class="mt-3 p-3 bg-gray-100 rounded border-l-4 border-orange-500 text-gray-800 font-medium">
      "{{ data.title }}"
    </p>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="gap-2">
    <button
      mat-button
      (click)="onCancel()"
      class="text-gray-700 hover:bg-gray-100">
      Cancel
    </button>
    <button
      mat-raised-button
      color="warn"
      (click)="onConfirm()"
      class="ml-2">
      Delete
    </button>
  </mat-dialog-actions>
</div>
